<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM API 配置测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .status { padding: 12px; border-radius: 4px; margin: 12px 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #e7f3ff; color: #004085; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 12px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐦 Quick Pick Birds - API 连通性测试</h1>

        <div id="results"></div>

        <h3>测试操作</h3>
        <button onclick="saveConfig()">💾 保存 LLM 配置</button>
        <button onclick="testConnection()">🔌 测试连接</button>
        <button onclick="runAllTests()">▶️ 运行所有测试</button>
        <button onclick="clearResults()">🗑️ 清除结果</button>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        const llmConfig = {
            provider: 'Anthropic',
            baseUrl: 'https://coding.dashscope.aliyuncs.com/apps/anthropic',
            apiKey: 'sk-sp-5e0621b39be44fea9ed5bf01c73c8305',
            model: 'claude-sonnet-4-20250514',
            timeout: 60,
            systemPrompt: '你是一位专业的鸟类学家和观鸟专家。请仔细分析这张照片，识别其中的鸟类。'
        };

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            document.getElementById('results').appendChild(div);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        function saveConfig() {
            localStorage.setItem('llm_api_config', JSON.stringify(llmConfig));
            log('✅ LLM 配置已保存到 localStorage', 'success');
        }

        async function testConnection() {
            log('🔌 正在测试 LLM 连接...', 'info');
            try {
                const res = await fetch(`${API_BASE}/api/llm/test-connection`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base_url: llmConfig.baseUrl,
                        api_key: llmConfig.apiKey,
                        model: llmConfig.model,
                        timeout: 30
                    })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    log(`✅ 连接成功！${data.message}`, 'success');
                } else {
                    log(`⚠️ 连接状态：${data.status} - ${data.message}`, 'error');
                }
            } catch (e) {
                log(`❌ 测试失败：${e.message}`, 'error');
            }
        }

        async function runAllTests() {
            clearResults();
            log('🚀 开始运行所有 API 测试...', 'info');

            const tests = [
                { name: '健康检查', url: `${API_BASE}/health`, method: 'GET' },
                { name: '根路由', url: `${API_BASE}/`, method: 'GET' },
                { name: '支持的格式', url: `${API_BASE}/api/scan/supported-formats`, method: 'GET' },
                { name: '鸟类物种列表', url: `${API_BASE}/api/birds/species-list`, method: 'GET' },
                { name: '筛图默认权重', url: `${API_BASE}/api/scoring/criteria/defaults`, method: 'GET' },
                { name: '小结物种列表', url: `${API_BASE}/api/summary/species/list`, method: 'GET' },
                { name: '会话列表', url: `${API_BASE}/api/summary/sessions?limit=10`, method: 'GET' },
                { name: '当日地图', url: `${API_BASE}/api/map/daily?date=${new Date().toISOString().split('T')[0]}`, method: 'GET' },
            ];

            let passed = 0;
            let failed = 0;

            for (const test of tests) {
                try {
                    const res = await fetch(test.url, { method: test.method });
                    if (res.ok) {
                        log(`✅ ${test.name} - ${res.status}`, 'success');
                        passed++;
                    } else {
                        log(`⚠️ ${test.name} - ${res.status}`, 'error');
                        failed++;
                    }
                } catch (e) {
                    log(`❌ ${test.name} - ${e.message}`, 'error');
                    failed++;
                }
            }

            // POST 测试
            const postTests = [
                { name: '扫描 API', url: `${API_BASE}/api/scan/scan`, body: { folder_path: '/test', include_subfolders: true } },
                { name: '鸟类识别 API', url: `${API_BASE}/api/birds/identify`, body: { photo_paths: ['/test.jpg'], save_to_db: false } },
                { name: '连拍分组 API', url: `${API_BASE}/api/birds/burst-groups`, body: { photo_paths: ['/test.jpg'], time_threshold: 5 } },
                { name: '筛图评分 API', url: `${API_BASE}/api/scoring/batch-score`, body: { image_paths: ['/test.jpg'], criteria: { focus_weight: 0.4 }, llm_config: llmConfig } },
                { name: 'LLM 连接测试', url: `${API_BASE}/api/llm/test-connection`, body: { base_url: llmConfig.baseUrl, api_key: llmConfig.apiKey, model: llmConfig.model, timeout: 30 } },
                { name: '生成小结 API', url: `${API_BASE}/api/summary/generate-summary`, body: { session_id: 1, output_path: '/test.html' } },
            ];

            for (const test of postTests) {
                try {
                    const res = await fetch(test.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(test.body)
                    });
                    // 接受 200, 400, 404, 500 作为有效响应（端点存在）
                    if ([200, 400, 404, 500, 422].includes(res.status)) {
                        log(`✅ ${test.name} - ${res.status}`, 'success');
                        passed++;
                    } else {
                        log(`⚠️ ${test.name} - ${res.status}`, 'error');
                        failed++;
                    }
                } catch (e) {
                    log(`❌ ${test.name} - ${e.message}`, 'error');
                    failed++;
                }
            }

            log(`\n📊 测试完成：${passed} 通过，${failed} 失败`, passed === tests.length + postTests.length ? 'success' : 'error');
        }

        // 页面加载时自动检查配置
        window.onload = () => {
            const saved = localStorage.getItem('llm_api_config');
            if (saved) {
                log('✅ 检测到已保存的 LLM 配置', 'success');
                log(`   Base URL: ${JSON.parse(saved).baseUrl}`, 'info');
                log(`   Model: ${JSON.parse(saved).model}`, 'info');
            } else {
                log('⚠️ 未检测到 LLM 配置，请点击"保存 LLM 配置"按钮', 'error');
            }
        };
    </script>
</body>
</html>
