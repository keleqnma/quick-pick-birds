# GitHub Actions CI 配置
name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio httpx fastapi pydantic

    - name: Run backend tests
      run: |
        cd backend
        python -m pytest tests/ -v --tb=short

  frontend-tests:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Install vitest
      run: |
        cd frontend
        npm install -D vitest jsdom @vitest/coverage-v8

    - name: Run frontend tests
      run: |
        cd frontend
        npm test

  api-integration-tests:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install fastapi uvicorn httpx pydantic pydantic-settings

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Start backend server
      run: |
        cd backend
        Start-Process -FilePath "python" -ArgumentList "-m", "uvicorn", "app.main:app", "--port", "8000" -NoNewWindow

    - name: Wait for backend
      run: |
        Start-Sleep -Seconds 5

    - name: Run API integration tests
      run: |
        cd frontend
        node test_full_api.js

    - name: Stop backend server
      if: always()
      run: |
        Stop-Process -Name "python" -Force -ErrorAction SilentlyContinue
